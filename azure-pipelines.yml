trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  - group: ecommerce-keyvault-secrets   # linked to Azure Key Vault in Library
  - name: ACR_NAME
    value: ecommercemcs.azurecr.io
  - name: BACKEND_IMAGE
    value: ecommercemcs.azurecr.io/ecommerce-backend
  - name: FRONTEND_IMAGE
    value: ecommercemcs.azurecr.io/ecommerce-frontend
  - name: IMAGE_TAG
    value: $(Build.BuildId)

stages:
  # Stage 1: Build and test
  - stage: CI
    displayName: Build and Test
    jobs:
      - job: BackendTest
        displayName: Backend - Install & Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
            displayName: Use Node 20

          - script: npm ci --omit=dev
            workingDirectory: backend
            displayName: Install backend dependencies

          - script: npm test
            workingDirectory: backend
            displayName: Run backend unit tests

      - job: FrontendBuild
        displayName: Frontend - Install, Test & Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
            displayName: Use Node 20

          - script: yarn install
            workingDirectory: frontend
            displayName: Install frontend dependencies

          - script: yarn test
            workingDirectory: frontend
            displayName: Run frontend unit tests

          - script: yarn build
            workingDirectory: frontend
            displayName: Build frontend

  # Stage 2: Docker build, scan and push
  - stage: DockerPush
    displayName: Docker Build, Scan and Push
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DockerBuildPush
        displayName: Build, scan and push images to ACR and Docker Hub
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Login to Docker Hub (avoid pull rate limit)
            inputs:
              containerRegistry: dockerhub-service-connection
              command: login

          - task: AzureCLI@2
            displayName: Login to ACR via Azure AD
            inputs:
              azureSubscription: acr-arm-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az acr login --name ecommercemcs

          - script: docker build -t $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG) -f backend/Dockerfile backend
            displayName: Build backend image

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(System.DefaultWorkingDirectory)/.trivyignore:/.trivyignore \
                ghcr.io/aquasecurity/trivy:latest image \
                  --exit-code 1 \
                  --severity HIGH,CRITICAL \
                  --ignorefile /.trivyignore \
                  --no-progress \
                  $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG)
            displayName: Scan backend image with Trivy

          - script: |
              docker push $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG)
              docker tag $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG) $(ACR_NAME)/ecommerce-backend:latest
              docker push $(ACR_NAME)/ecommerce-backend:latest
            displayName: Push backend image to ACR

          - script: |
              docker tag $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG) singhvikas872/ecommerce-backend:$(IMAGE_TAG)
              docker tag $(ACR_NAME)/ecommerce-backend:$(IMAGE_TAG) singhvikas872/ecommerce-backend:latest
            displayName: Tag backend image for Docker Hub

          - task: Docker@2
            displayName: Push backend image to Docker Hub
            inputs:
              containerRegistry: dockerhub-service-connection
              repository: singhvikas872/ecommerce-backend
              command: push
              tags: |
                $(IMAGE_TAG)
                latest

          - script: docker build -t $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG) -f frontend/Dockerfile frontend
            displayName: Build frontend image

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(System.DefaultWorkingDirectory)/.trivyignore:/.trivyignore \
                ghcr.io/aquasecurity/trivy:latest image \
                  --exit-code 1 \
                  --severity HIGH,CRITICAL \
                  --ignorefile /.trivyignore \
                  --no-progress \
                  $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG)
            displayName: Scan frontend image with Trivy

          - script: |
              docker push $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG)
              docker tag $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG) $(ACR_NAME)/ecommerce-frontend:latest
              docker push $(ACR_NAME)/ecommerce-frontend:latest
            displayName: Push frontend image to ACR

          - script: |
              docker tag $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG) singhvikas872/ecommerce-frontend:$(IMAGE_TAG)
              docker tag $(ACR_NAME)/ecommerce-frontend:$(IMAGE_TAG) singhvikas872/ecommerce-frontend:latest
            displayName: Tag frontend image for Docker Hub

          - task: Docker@2
            displayName: Push frontend image to Docker Hub
            inputs:
              containerRegistry: dockerhub-service-connection
              repository: singhvikas872/ecommerce-frontend
              command: push
              tags: |
                $(IMAGE_TAG)
                latest

          - script: |
              sed -i "s|IMAGE_TAG|$(IMAGE_TAG)|g" backend.yaml frontend.yaml
            displayName: Substitute image tag in K8s manifests

          - task: PublishPipelineArtifact@1
            displayName: Publish K8s manifests as artifact
            inputs:
              targetPath: $(System.DefaultWorkingDirectory)
              artifact: k8s-manifests
              publishLocation: pipeline

  # Stage 3: Deploy to AKS staging
  - stage: DeployStaging
    displayName: Deploy to AKS Staging
    dependsOn: DockerPush
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployToStaging
        displayName: Deploy to staging namespace
        pool:
          vmImage: ubuntu-latest
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifact: k8s-manifests
                    path: $(Pipeline.Workspace)/manifests

                - task: AzureCLI@2
                  displayName: Deploy to AKS staging
                  inputs:
                    azureSubscription: acr-arm-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials -g ecommerce-rg -n ecommerce-aks --admin --overwrite-existing
                      kubectl apply -n staging -f $(Pipeline.Workspace)/manifests/backend.yaml
                      kubectl apply -n staging -f $(Pipeline.Workspace)/manifests/frontend.yaml

  # Stage 4: Deploy to AKS production (manual approval gate)
  - stage: DeployProduction
    displayName: Deploy to AKS Production
    dependsOn: DockerPush
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToProduction
        displayName: Deploy to production namespace
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifact: k8s-manifests
                    path: $(Pipeline.Workspace)/manifests

                - task: AzureCLI@2
                  displayName: Deploy to AKS production
                  inputs:
                    azureSubscription: acr-arm-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials -g ecommerce-rg -n ecommerce-aks --admin --overwrite-existing
                      kubectl apply -n production -f $(Pipeline.Workspace)/manifests/backend.yaml
                      kubectl apply -n production -f $(Pipeline.Workspace)/manifests/frontend.yaml
